app = "sensecure-ai"
primary_region = "jnb"

[build]
  dockerfile = "Dockerfile"

[env]
  BASE = "/app"
  PORT = "8000"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
